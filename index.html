<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Gallery</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; line-height: 1.5; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--primary); }
        .search-wrapper { display: flex; justify-content: center; margin-top: 1rem; }
        .search-box { display: flex; align-items: center; background: var(--card-bg); border: 2px solid #e5e7eb;
                       border-radius: 9999px; padding: .55rem 1.2rem; width: 100%; max-width: 480px;
                       gap: .6rem; transition: border-color .2s, box-shadow .2s; }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .search-box svg { flex-shrink: 0; color: var(--text-muted); }
        .search-box input { border: none; outline: none; font-size: 1rem; color: var(--text-main);
                             background: transparent; width: 100%; }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-clear { background: none; border: none; cursor: pointer; color: var(--text-muted);
                         padding: 0; font-size: 1.1rem; line-height: 1; display: none; }
        .search-clear.visible { display: block; }
        .filters { display: flex; justify-content: center; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem; }
        .filter-btn { background: var(--card-bg); border: 1px solid #e5e7eb; padding: .5rem 1rem;
                       border-radius: 9999px; cursor: pointer; font-weight: 500; color: var(--text-muted);
                       transition: all .2s; }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                 gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem;
                 box-shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
                 transition: transform .2s, box-shadow .2s; cursor: pointer; position: relative;
                 display: flex; flex-direction: column; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,.1); border-color: var(--primary); }
        .card-category { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
                          color: var(--primary); font-weight: 700; margin-bottom: .5rem; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
        .card-prompt { font-size: .875rem; color: var(--text-muted); background: #f9fafb; padding: 1rem;
                        border-radius: 8px; overflow-wrap: break-word; flex-grow: 1; white-space: pre-wrap;
                        display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical;
                        overflow: hidden; text-overflow: ellipsis; }
        .copy-overlay { position: absolute; bottom: 1.5rem; right: 1.5rem; background: var(--primary);
                         color: white; padding: .4rem .8rem; border-radius: 6px; font-size: .875rem;
                         font-weight: 500; opacity: 0; transition: opacity .2s; pointer-events: none; }
        .card:hover .copy-overlay { opacity: 1; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
                  background: var(--success); color: white; padding: .75rem 1.5rem; border-radius: 9999px;
                  font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,.1);
                  transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 50; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .no-results { text-align: center; color: var(--text-muted); font-size: 1.1rem;
                       padding: 3rem 0; grid-column: 1 / -1; }
        .generated-note { text-align: center; color: var(--text-muted); font-size: .8rem; margin-top: 3rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>AI Prompt Gallery</h1>
        <div class="search-wrapper">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by title or prompt text…" autocomplete="off"/>
                <button class="search-clear" id="searchClear" title="Clear">&#x2715;</button>
            </div>
        </div>
    </header>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="App-Rest">App-Rest</button>
    </div>

    <div class="grid" id="grid"></div>
    <div class="toast" id="toast">✅ Prompt copied to clipboard!</div>
    <p class="generated-note">Generated 2026-04-26 21:31 · 2 prompts</p>

    <script>
        const prompts = [
            {
                        "category": "App-Rest",
                        "title": "GUI PYTHON TO CLI PYTHON",
                        "text": "Convert this Tkinter POS app into a terminal-only Python server. Reuse the existing backend classes and Flask app, remove only GUI/Tkinter code, preserve config/data compatibility exactly, add an argparse CLI entrypoint, and return one complete runnable Python file only."
            },
            {
                        "category": "App-Rest",
                        "title": "Mofify python file to adapt to html",
                        "text": "This python file is used to generate a html file based on the tempelate we generated above. Modify this python file to adapt to new items form this web tempelate above / or attached."
            }
];

        const grid = document.getElementById('grid');
        const filters = document.getElementById('filters');
        const toast = document.getElementById('toast');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        let toastTimeout, activeFilter = 'All', activeQuery = '';

        function highlight(text, q) {
            if (!q) return text;
            const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${esc})`, 'gi'),
                '<mark style="background:#ede9fe;color:#4f46e5;border-radius:3px;padding:0 2px;">$1</mark>');
        }

        function renderCards() {
            grid.innerHTML = '';
            let filtered = activeFilter === 'All' ? prompts : prompts.filter(p => p.category === activeFilter);
            if (activeQuery.trim()) {
                const q = activeQuery.trim().toLowerCase();
                filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.text.toLowerCase().includes(q));
            }
            if (!filtered.length) {
                const m = document.createElement('div');
                m.className = 'no-results'; m.textContent = 'No prompts match your search.';
                grid.appendChild(m); return;
            }
            filtered.forEach(prompt => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => copyToClipboard(prompt.text, card);
                card.innerHTML = `
                    <div class="card-category">${highlight(prompt.category, activeQuery)}</div>
                    <div class="card-title">${highlight(prompt.title, activeQuery)}</div>
                    <div class="card-prompt">${highlight(prompt.text, activeQuery)}</div>
                    <div class="copy-overlay">Copy</div>`;
                grid.appendChild(card);
            });
        }

        async function copyToClipboard(text, card) {
            try {
                await navigator.clipboard.writeText(text);
                const ov = card.querySelector('.copy-overlay');
                ov.textContent = 'Copied!'; ov.style.backgroundColor = 'var(--success)';
                setTimeout(() => { ov.textContent = 'Copy'; ov.style.backgroundColor = 'var(--primary)'; }, 2000);
                clearTimeout(toastTimeout);
                toast.classList.add('show');
                toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            } catch(e) { console.error(e); }
        }

        filters.addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            renderCards();
        });

        searchInput.addEventListener('input', () => {
            activeQuery = searchInput.value;
            searchClear.classList.toggle('visible', activeQuery.length > 0);
            renderCards();
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = ''; activeQuery = '';
            searchClear.classList.remove('visible');
            searchInput.focus(); renderCards();
        });

        renderCards();
    </script>
</body>
</html>
