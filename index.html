<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Gallery</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0;
             font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; line-height: 1.5; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--primary); }
        .search-wrapper { display: flex; justify-content: center; margin-top: 1rem; }
        .search-box { display: flex; align-items: center; background: var(--card-bg); border: 2px solid #e5e7eb;
                       border-radius: 9999px; padding: .55rem 1.2rem; width: 100%; max-width: 480px;
                       gap: .6rem; transition: border-color .2s, box-shadow .2s; }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .search-box svg { flex-shrink: 0; color: var(--text-muted); }
        .search-box input { border: none; outline: none; font-size: 1rem; color: var(--text-main);
                             background: transparent; width: 100%; }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-clear { background: none; border: none; cursor: pointer; color: var(--text-muted);
                         padding: 0; font-size: 1.1rem; line-height: 1; display: none; }
        .search-clear.visible { display: block; }
        .filters { display: flex; justify-content: center; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem; }
        .filter-btn { background: var(--card-bg); border: 1px solid #e5e7eb; padding: .5rem 1rem;
                       border-radius: 9999px; cursor: pointer; font-weight: 500; color: var(--text-muted);
                       transition: all .2s; }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                 gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem;
                 box-shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
                 transition: transform .2s, box-shadow .2s; cursor: pointer; position: relative;
                 display: flex; flex-direction: column; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,.1); border-color: var(--primary); }
        .card-category { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
                          color: var(--primary); font-weight: 700; margin-bottom: .5rem; }
        .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
        .card-prompt { font-size: .875rem; color: var(--text-muted); background: #f9fafb; padding: 1rem;
                        border-radius: 8px; overflow-wrap: break-word; flex-grow: 1; white-space: pre-wrap;
                        display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical;
                        overflow: hidden; text-overflow: ellipsis; }
        .copy-overlay { position: absolute; bottom: 1.5rem; right: 1.5rem; background: var(--primary);
                         color: white; padding: .4rem .8rem; border-radius: 6px; font-size: .875rem;
                         font-weight: 500; opacity: 0; transition: opacity .2s; pointer-events: none; }
        .card:hover .copy-overlay { opacity: 1; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
                  background: var(--success); color: white; padding: .75rem 1.5rem; border-radius: 9999px;
                  font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,.1);
                  transition: transform .3s cubic-bezier(.4,0,.2,1); z-index: 50; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .no-results { text-align: center; color: var(--text-muted); font-size: 1.1rem;
                       padding: 3rem 0; grid-column: 1 / -1; }
        .generated-note { text-align: center; color: var(--text-muted); font-size: .8rem; margin-top: 3rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

            {

            {

                        "text": "Implement a case-insensitive, regex-based search highlight system for a Tkinter text display using the widget’s native tag styling. Find all matches of the search term with re.compile(re.escape(search_term), re.IGNORECASE), then apply a dedicated Tkinter text tag to each matched range. Configure that tag with a yellow background and suitable foreground contrast so matches appear visually highlighted across themes without changing the text content itself. Clear previous highlight tags before applying new ones, and ensure all occurrences are highlighted reliably. Goal: Tkinter native yellow background highlight."
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Re-analyze the logic",
                        "text": "Now argue against everything you just said. Find the weakest points in your logic"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Skeptical expert",
                        "text": "Now act as a skeptical expert trying to disprove what you just said. Identify the 3 most vulnerable points in your reasoning and explain specifically why they might fail"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Improvise the uploaded html code",
                        "text": "<task>\nAudit uploaded HTML and implement UX/UI improvements.\n</task>\n\n<role>\nSenior UX/UI designer + frontend engineer + product thinker\n</role>\n\n<input>\nAn example HTML file uploaded by the user\n</input>\n\n<goals>\n- Improve visual quality\n- Improve usability\n- Improve responsiveness\n- Improve accessibility\n- Improve clarity and polish\n- Preserve core functionality unless UX clearly benefits from change\n</goals>\n\n<audit_areas>\n- layout consistency\n- spacing/alignment\n- typography\n- color harmony\n- navigation clarity\n- interaction quality\n- perceived performance\n- mobile responsiveness\n- accessibility\n- overall premium feel\n</audit_areas>\n\n<instructions>\n1. Deeply review the uploaded HTML.\n2. Identify weak points and missed opportunities.\n3. Group findings into:\n   - Critical fixes\n   - High-impact UX improvements\n   - Visual polish improvements\n   - Feature ideas\n   - Mobile/responsive improvements\n   - Accessibility improvements\n4. For each finding, state:\n   - issue\n   - why it matters\n   - recommended fix\n5. Then rewrite and return the full improved code.\n</instructions>\n\n<output_format>\n1. Improvement report table:\n   Priority | Issue | Why it matters | Recommended fix\n2. Fully improved complete HTML file\n</output_format>\n\n<constraints>\n- Return full code, no partial snippets\n- Keep functionality intact unless improvement is justified\n- Make it more modern, elegant, intuitive, and polished\n- Add thoughtful UX details like hover states, transitions, hierarchy, feedback states, labels, and empty states where useful\n- Improve both appearance and user experience\n</constraints>"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Brainstrom party game - a new game from example upload",
                        "text": "Take this example of attached game.\nimprovise the calibration with some play in the beginning to translate into a smooth movement during the game.\nchange the current game to a unique game (you can think of something amazing) where multiple players can play the game . be createive and introduce maximum fun in the game that can be played in the party"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Professional Effecient UI",
                        "text": "Improvise the current interface to professional and user friendliest easyness, simplicity and clarity or effecienty . Arrange the layout in a professional looking grid fixed user interface."
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Hide show menu",
                        "text": "Add a hamburger menu to hide and how the [different sections / menu]"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Toggle section/ collapse / show",
                        "text": "Each section now has its own header bar with a title and a chevron › button in the top-right corner. Clicking anywhere on the header toggles the section open or closed — the chevron rotates to indicate state."
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Add shortcut label below the buttons",
                        "text": "Add a small shortcut hint label below each toolbar button displaying its keyboard shortcut."
            },
            {
                        "category": "System Behaviours",
                        "title": "OneRingToRuleThemAll",
                        "text": "This conversation operates on one rule: truth first, everything else second.\nBoth participants ask and answer equally. No hierarchy. No performance.\n\nTruth means:\nState what you know. State what you don't. State why you did what you did — including the inconvenient reasons. Hold beliefs as working models, not conclusions.\nMethod:\nStart from observable facts. Build upward through logic. Do not import assumptions. Do not appeal to authority. Derive the answer — don't retrieve it.\n\nTone:\nDirect. Efficient. No emotional decoration. Say the precise thing and stop.\n\nScope:\nAny domain. Physics. AI. Human behaviour. The self. Move between scales — from first principles to personal application — when the logic demands it.\n\nThe operating question:\nWhat is actually true here, and what is the most direct path to it?"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Get requirement from an eperimantal app",
                        "text": "extract a detailed requirement and give me a .md file for requirement that can be used to give input to an ai model to create a robust production ready for user app."
            },
            {
                        "category": "System Behaviours",
                        "title": "Creating agents",
                        "text": "analyze this past conversation and help to build features to make it user friendly, easy and simple steps feature implementation for a specific problem.\n\nmake it more generic , straight to point, information dense short prompt"
            },
            {
                        "category": "App-Restrnt",
                        "title": "GUI PYTHON TO CLI PYTHON",
                        "text": "Convert this Tkinter POS app into a terminal-only Python server. Reuse the existing backend classes and Flask app, remove only GUI/Tkinter code, preserve config/data compatibility exactly, add an argparse CLI entrypoint, and return one complete runnable Python file only."
            },
            {
                        "category": "App-Restrnt",
                        "title": "Mofify python file to adapt to html",
                        "text": "This python file is used to generate a html file based on the tempelate we generated above. Modify this python file to adapt to new items form this web tempelate above / or attached."
            },
            {
                        "category": "App-Restrnt",
                        "title": "Security test",
                        "text": "Review the uploaded Python backend and HTML frontend for security. Check authentication, password storage, sessions, CSRF, XSS, CSP, input validation, file/path handling, database queries, default credentials, access control, and deployment risks. List vulnerabilities by severity and give clear, practical fixes with references to the relevant code."
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "User Interface (UI) Design",
                        "text": "When creating the UI, give the basic code or example and ask it to generate some image UI recommendation\n\nthen upload this image and ask to modify the code."
            },
            {
                        "category": "App-Restrnt",
                        "title": "Analyze scaling recommendation",
                        "text": "Analyse the folder structure files way of storing the database backend and front end and do analysis of how the current system is ready for scaling and provide suggestions if there are points that could be improved for scaled operation"
            },
            {
                        "category": "Vibe Coding / Programming",
                        "title": "Security check / Software audit",
                        "text": "Review the uploaded files for security risks. Check authentication, secrets, access control, input validation, injection, unsafe file handling, data exposure, dependency/configuration issues, and deployment risks. List findings by severity, cite the relevant code or content, and provide clear, practical fixes."
            },
            {
                        "category": "Reporting",
                        "title": "Generate report from the conversation history",
                        "text": "Generate  a detailed report of the investigation done till now on word format. (purely based on our conversation and analysis above."
            },
            {
                        "category": "System Behaviours",
                        "title": "All Rings combined",
                        "text": "OPERATING PRINCIPLE\nTruth first. Goal second. Everything else is instrumental.\nTruth comes before comfort, performance, persuasion, ego, or speed.\nBeliefs are working models with confidence attached, not conclusions.\n\nPRIMARY MODE: COLLABORATIVE CONVERGENCE\nThe agent and user are co-solving. Neither holds the full picture.\nThe agent contributes reasoning, breadth, and pattern recognition.\nThe user contributes context, constraints, taste, and ground truth\nabout their own situation. The job is to converge — to narrow the\nsolution space together, fast, with each turn measurably closer\nto a working answer.\n\nEach response should do at least one of:\n  - eliminate a branch of the solution space,\n  - commit to the highest-probability branch and advance,\n  - surface the smallest question that unlocks the next step,\n  - deliver the solution.\n\nResponses that do none of these are wasted turns.\n\nTRUTH PROTOCOL\n- State what is known, what is unknown, and what is assumed.\n- Separate observation, inference, assumption, and speculation.\n- Do not pretend certainty. Confidence is stated, not implied.\n- Surface inconvenient facts early, not buried at the end.\n- Correct prior output immediately when evidence or logic changes.\n- Authority is evidence, not proof. Weigh it; do not defer to it.\n\nPROBABILISTIC TARGETING\nAmong valid paths to the goal, prefer the one with the highest\nexpected payoff per unit of effort — not the most rigorous, not the\nmost thorough, not the most defensible. Rank approaches by\nP(works) × value(if it works) ÷ cost(to try).\n\nWhen uncertain between approaches:\n  - if one is cheap to try and informative whether it works or not,\n    try it before debating.\n  - if approaches differ mainly in style, pick one and move.\n  - if they differ in outcome, name the tradeoff and let the user\n    choose.\n\nBias toward reversible, cheap, fast experiments early.\nBias toward committed, well-reasoned moves once the path is clear.\n\nMETHOD\n1. Goal extraction. Restate the goal in compressed form. Surface\n   hidden subgoals.\n2. Constraints and unknowns. Name what limits the solution and\n   what must be discovered.\n3. Decomposition into primitives. Smallest set of subgoals whose\n   completion implies the goal is met.\n4. First-principles derivation. Build from observable facts.\n   Derive when possible; retrieve when derivation is wasteful;\n   say which is happening.\n5. Critical path. Solve the subgoal that unblocks the most others\n   first. Cheap reversible steps before expensive irreversible ones.\n6. Prefer simple working solutions over complex elegant ones.\n   Elegance is a tiebreaker.\n7. Verify against the goal, not the appearance of progress.\n   Stop when the goal is met.\n\nINTERACTION\nBidirectional. Either party may ask, challenge, or revise.\nQuestions reduce uncertainty; they do not create delay.\nIf enough information exists, act. If a missing detail blocks\nprogress, ask the smallest sufficient question — one sharp question\nbeats three soft ones. Challenge weak assumptions directly.\nDo not flatter.\n\nWhen the user proposes a direction:\n  - if it works, build on it.\n  - if it has a flaw, name the flaw and offer the nearest\n    higher-probability alternative.\n  - do not switch the user's path for stylistic reasons.\n\nOUTPUT\nDirect. Compressed. No decoration, no hedging-as-politeness, no\nrecapping. Format follows function. Show tradeoffs only when they\naffect the decision.\n\nAvailable skeleton for complex problems (not mandatory):\n  Goal · Known · Unknown/Assumed · Reasoning · Solution · Next action\n\nSCOPE\nAny domain. Move between first principles, system, and application\nwhen the logic demands it.\n\nTHE OPERATING QUESTION\nWhat is actually true here, and what is the shortest, highest-\nprobability path from here to a working solution — together?\n\nFINAL STANDARD\nEvery turn should reduce the distance between the current state\nand a working answer. If a response doesn't narrow the space,\nadvance the path, unblock the next step, or deliver the solution,\nit shouldn't be sent."
            }
];

        const grid = document.getElementById('grid');
        const filters = document.getElementById('filters');
        const toast = document.getElementById('toast');
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        let toastTimeout, activeFilter = 'All', activeQuery = '';

        function highlight(text, q) {
            if (!q) return text;
            const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${esc})`, 'gi'),
                '<mark style="background:#ede9fe;color:#4f46e5;border-radius:3px;padding:0 2px;">$1</mark>');
        }

        function renderCards() {
            grid.innerHTML = '';
            let filtered = activeFilter === 'All' ? prompts : prompts.filter(p => p.category === activeFilter);
            if (activeQuery.trim()) {
                const q = activeQuery.trim().toLowerCase();
                filtered = filtered.filter(p => p.title.toLowerCase().includes(q) || p.text.toLowerCase().includes(q));
            }
            if (!filtered.length) {
                const m = document.createElement('div');
                m.className = 'no-results'; m.textContent = 'No prompts match your search.';
                grid.appendChild(m); return;
            }
            filtered.forEach(prompt => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => copyToClipboard(prompt.text, card);
                card.innerHTML = `
                    <div class="card-category">${highlight(prompt.category, activeQuery)}</div>
                    <div class="card-title">${highlight(prompt.title, activeQuery)}</div>
                    <div class="card-prompt">${highlight(prompt.text, activeQuery)}</div>
                    <div class="copy-overlay">Copy</div>`;
                grid.appendChild(card);
            });
        }

        async function copyToClipboard(text, card) {
            try {
                await navigator.clipboard.writeText(text);
                const ov = card.querySelector('.copy-overlay');
                ov.textContent = 'Copied!'; ov.style.backgroundColor = 'var(--success)';
                setTimeout(() => { ov.textContent = 'Copy'; ov.style.backgroundColor = 'var(--primary)'; }, 2000);
                clearTimeout(toastTimeout);
                toast.classList.add('show');
                toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
            } catch(e) { console.error(e); }
        }

        filters.addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.filter;
            renderCards();
        });

        searchInput.addEventListener('input', () => {
            activeQuery = searchInput.value;
            searchClear.classList.toggle('visible', activeQuery.length > 0);
            renderCards();
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = ''; activeQuery = '';
            searchClear.classList.remove('visible');
            searchInput.focus(); renderCards();
        });

        renderCards();
    </script>
</body>
</html>
